apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "backend-shadow.fullname" . }}
  labels:
    {{- include "backend-shadow.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "backend-shadow.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "backend-shadow.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/01-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: APP_NAME
              value: {{ .Values.api.appName | quote }}
            - name: APP_VERSION
              value: {{ .Values.api.version | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz/
              port: http
          livenessProbe:
            httpGet:
              path: /healthz/
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf.template
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "backend-shadow.fullname" . }}
  strategy:
    canary:
      stableService: {{ include "backend-shadow.fullname" . }}-stable
      canaryService: {{ include "backend-shadow.fullname" . }}-canary
      trafficRouting:
        managedRoutes:
          - name: shadow
        istio:
          virtualServices:
            # The `primary` route stays declared here for weight patching
            # (setWeight). The mirror route is added/removed dynamically
            # by Rollouts using the managedRoutes entry above.
            - name: {{ include "backend-shadow.fullname" . }}
              routes:
                - primary
      steps:
        {{- toYaml .Values.shadow.canary.steps | nindent 8 }}
