# Stable Service: receives all client-visible traffic
apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend-shadow.fullname" . }}-stable
  labels:
    {{- include "backend-shadow.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "backend-shadow.selectorLabels" . | nindent 4 }}
---
# Canary Service: receives MIRRORED traffic
apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend-shadow.fullname" . }}-canary
  labels:
    {{- include "backend-shadow.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "backend-shadow.selectorLabels" . | nindent 4 }}
