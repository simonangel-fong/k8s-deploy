replicaCount: 4

image:
  repository: nginx
  tag: alpine
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

host: deploy.arguswatcher.net
gateway:
  namespace: istio-ingress
  name: demo-gateway

api:
  appName: demo app - shadow
  version: V4.0.1

security:
  enabled: true

shadow:
  canary:
    steps:
      # Phase 0 — scale the canary ReplicaSet independently of traffic weight.
      # setMirrorRoute alone does NOT create canary pods; Rollouts only sizes
      # the canary RS when setWeight fires. Without this step, mirrored
      # traffic goes to a Service whose selector matches zero pods and the
      # shadow demo is silent.
      # matchTrafficWeight: false decouples pod count from route weight —
      # "give me 2 canary pods regardless of the 0% traffic weight."
      - setCanaryScale:
          replicas: 2
          matchTrafficWeight: false

      # Phase 1 — shadow only.
      # setMirrorRoute patches the VirtualService so 100% of GET traffic on
      # the `primary` route is mirrored (fire-and-forget) to the canary
      # Service. Real traffic weight to canary stays at 0 — clients only
      # ever see stable responses.
      - setMirrorRoute:
          name: shadow
          match:
            - method: { exact: GET }
          percentage: 100
      # Manual gate — inspect canary pod logs, compare metrics, then promote.
      # Follows canary logs with:
      #   kubectl logs -n backend -l app.kubernetes.io/name=backend-shadow \
      #     -l rollouts-pod-template-hash=<canary-hash> -f
      - pause: {}

      # Phase 2 — remove the mirror before real traffic starts.
      # `setMirrorRoute` with only `name` (no match/percentage) removes the
      # previously-added mirror route.
      - setMirrorRoute: { name: shadow }

      # Hand pod scaling back to Rollouts — from here the canary RS is sized
      # proportional to setWeight (matchTrafficWeight defaults back to true).
      - setCanaryScale:
          matchTrafficWeight: true

      # Phase 3 — weighted canary ramp. Auto-progresses through 10 → 50,
      # then parks at the final unbounded pause for manual promote/abort.
      - setWeight: 10
      - pause: { duration: 2m }
      - setWeight: 50
      - pause: {}
