apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "backend.fullname" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "backend.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz/
              port: http
          livenessProbe:
            httpGet:
              path: /healthz/
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "backend.fullname" . }}
  strategy:
    blueGreen:
      # Service selectors are patched by Rollouts at runtime with
      # rollouts-pod-template-hash to bind active -> old ReplicaSet
      # and preview -> new ReplicaSet.
      activeService: {{ include "backend.fullname" . }}-active
      previewService: {{ include "backend.fullname" . }}-preview
      # Auto-promotion: after the new ReplicaSet becomes fully available, wait
      # `autoPromotionSeconds` (soak time on the preview lane), then flip the
      # active Service to point at it — no manual `promote` needed.
      autoPromotionEnabled: true
      autoPromotionSeconds: {{ .Values.blueGreen.autoPromotionSeconds }}
      # Keep the old ReplicaSet running this long after the flip so aborts are near-instant.
      scaleDownDelaySeconds: {{ .Values.blueGreen.scaleDownDelaySeconds }}
