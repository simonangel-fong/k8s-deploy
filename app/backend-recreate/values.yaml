replicaCount: 4

image:
  repository: nginx
  tag: alpine
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

host: deploy.arguswatcher.net
gateway:
  namespace: istio-ingress
  name: demo-gateway

api:
  appName: demo app - recreate
  version: V6.0.0

security:
  enabled: true

# Recreate strategy has NO tunable knobs — that's the whole point.
# maxSurge / maxUnavailable would be invalid under strategy.type: Recreate.
# The transition is: scale old RS to 0, wait for termination, scale new RS
# up. Downtime is intrinsic; this chart exists to make it visible.
