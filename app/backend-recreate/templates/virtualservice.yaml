# Trivial VirtualService — single route, single destination, no weighting.
# Istio is present here only for mTLS + AuthorizationPolicy consistency
# with the other charts. There is no traffic-splitting because Recreate
# doesn't have multiple versions running at the same time — it has ONE
# version running or NONE.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ include "backend-recreate.fullname" . }}
  labels:
    {{- include "backend-recreate.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ .Values.host | quote }}
  gateways:
    - {{ .Values.gateway.namespace }}/{{ .Values.gateway.name }}
  http:
    - name: primary
      match:
        - uri:
            prefix: /api/
      route:
        - destination:
            host: {{ include "backend-recreate.fullname" . }}
            port:
              number: {{ .Values.service.port }}
