# Two Services required by the Argo Rollouts + Istio canary/A-B pattern.
# Selectors here match ALL backend pods; Rollouts patches each Service's
# selector at runtime with `rollouts-pod-template-hash: <hash>` to bind
# stable -> old ReplicaSet (variant A), canary -> new ReplicaSet (variant B).
# The VirtualService then routes header-tagged requests to canary and
# weight-splits the rest between the two.
---
# Stable Service — variant A. Referenced by Rollout.spec.strategy.canary.stableService.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend-ab.fullname" . }}-stable
  labels:
    {{- include "backend-ab.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "backend-ab.selectorLabels" . | nindent 4 }}
---
# Canary Service — variant B. Referenced by Rollout.spec.strategy.canary.canaryService.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend-ab.fullname" . }}-canary
  labels:
    {{- include "backend-ab.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "backend-ab.selectorLabels" . | nindent 4 }}
