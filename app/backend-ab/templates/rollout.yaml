apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "backend-ab.fullname" . }}
  labels:
    {{- include "backend-ab.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "backend-ab.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "backend-ab.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Env vars are baked into each pod at creation — the new ReplicaSet
          # freezes APP_VERSION at the value from the manifest that spawned it,
          # so variant A pods keep serving the old version until they're
          # scaled down at the end of the rollout.
          env:
            - name: APP_NAME
              value: {{ .Values.api.appName | quote }}
            - name: APP_VERSION
              value: {{ .Values.api.version | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz/
              port: http
          livenessProbe:
            httpGet:
              path: /healthz/
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # nginx:alpine's docker-entrypoint runs envsubst on every
            # *.template in /etc/nginx/templates/ and writes the result to
            # /etc/nginx/conf.d/ before nginx starts.
            - name: nginx-conf
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf.template
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "backend-ab.fullname" . }}
  strategy:
    canary:
      # Rollouts patches these Services' selectors at runtime with
      # rollouts-pod-template-hash to bind stable -> variant A ReplicaSet,
      # canary -> variant B ReplicaSet.
      stableService: {{ include "backend-ab.fullname" . }}-stable
      canaryService: {{ include "backend-ab.fullname" . }}-canary
      trafficRouting:
        istio:
          virtualServices:
            # Only the `primary` route is weight-patched. The `variant`
            # header route stays put so testers can pin to B.
            - name: {{ include "backend-ab.fullname" . }}
              routes:
                - primary
      # Manual promotion is achieved by ending `steps` with an unbounded
      # `- pause: {}` — canary has no autoPromotionEnabled field (that's
      # blueGreen-only). The rollout parks at the final pause until a human
      # runs `kubectl argo rollouts promote`.
      steps:
        {{- toYaml .Values.ab.canary.steps | nindent 8 }}
