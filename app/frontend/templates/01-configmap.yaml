apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "frontend.fullname" . }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen {{ .Values.service.port }};
      server_name _;
      root /usr/share/nginx/html;

      location = / {
        try_files /index.html =404;
      }

      location = /healthz/ {
        default_type text/plain;
        return 200 'ok';
      }
    }

  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="utf-8">
      <title>demo app</title>
      <style>
        body { font-family: system-ui, sans-serif; margin: 4rem auto; max-width: 32rem; }
        .card { padding: 1.5rem; border: 1px solid #ddd; border-radius: 8px; }
        .label { color: #666; font-size: 0.85rem; text-transform: uppercase; }
        .value { font-size: 1.4rem; margin-bottom: 1rem; }
      </style>
    </head>
    <body>
      <div class="card">
        <div class="label">App name</div>
        <div class="value" id="app">loading…</div>
        <div class="label">Version</div>
        <div class="value" id="version">loading…</div>
      </div>
      <script>
        fetch('/api/')
          .then(r => r.json())
          .then(d => {
            document.getElementById('app').textContent = d.app;
            document.getElementById('version').textContent = d.version;
          })
          .catch(e => {
            document.getElementById('app').textContent = 'error';
            document.getElementById('version').textContent = e.message;
          });
      </script>
    </body>
    </html>
