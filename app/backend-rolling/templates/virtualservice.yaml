# Trivial VirtualService — single route, single destination, no weighting.
# Istio is present here only for mTLS + AuthorizationPolicy consistency
# with the other charts. There's no traffic-splitting because
# RollingUpdate doesn't distinguish versions at the routing layer;
# every request just goes to "the Service" and kube-proxy picks a pod.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ include "backend-rolling.fullname" . }}
  labels:
    {{- include "backend-rolling.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ .Values.host | quote }}
  gateways:
    - {{ .Values.gateway.namespace }}/{{ .Values.gateway.name }}
  http:
    - name: primary
      match:
        - uri:
            prefix: /api/
      route:
        - destination:
            host: {{ include "backend-rolling.fullname" . }}
            port:
              number: {{ .Values.service.port }}
