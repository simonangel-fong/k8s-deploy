# values.yaml
replicaCount: 4

image:
  repository: nginx
  tag: alpine
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

host: deploy.arguswatcher.net
gateway:
  namespace: istio-ingress
  name: demo-gateway

api:
  appName: demo app - rolling
  version: V1.0.1

security:
  enabled: true

rolling:
  maxSurge: 25% # extra pods above desired
  maxUnavailable: 0 # zero unavailable
