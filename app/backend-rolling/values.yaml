replicaCount: 4

image:
  repository: nginx
  tag: alpine
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

host: deploy.arguswatcher.net
gateway:
  namespace: istio-ingress
  name: demo-gateway

api:
  appName: demo app - rolling
  version: V1.0.0

security:
  enabled: true

rolling:
  # maxSurge — extra pods above desired that may be created during a rollout.
  # 25% at 4 replicas rounds up to 1 surge pod at a time.
  maxSurge: 25%
  # maxUnavailable: 0 keeps capacity at 100% throughout the rollout — the
  # Deployment controller must wait for a new pod to be Ready before it
  # terminates an old one. Trade: rollout takes marginally longer.
  # The k8s default of 25% dips capacity by 1 pod at 4 replicas, which is
  # rarely what you want for user-facing services.
  maxUnavailable: 0
