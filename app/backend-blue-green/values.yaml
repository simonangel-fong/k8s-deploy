replicaCount: 5

image:
  repository: nginx
  tag: alpine
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

host: deploy.arguswatcher.net
gateway:
  namespace: istio-ingress
  name: demo-gateway

api:
  appName: demo app
  version: V1.1.18

security:
  enabled: true

blueGreen:
  # Header used to route requests to the preview version.
  # e.g. curl -H 'x-preview: true' https://deploy.arguswatcher.net/api/
  previewHeader: x-preview
  # Soak time on the preview lane before Rollouts auto-flips the active Service.
  autoPromotionSeconds: 60
  # Seconds to keep the old ReplicaSet alive after promotion for instant rollback.
  scaleDownDelaySeconds: 120
