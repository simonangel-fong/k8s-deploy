replicaCount: 4

image:
  repository: nginx
  tag: alpine
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

host: deploy.arguswatcher.net
gateway:
  namespace: istio-ingress
  name: demo-gateway

api:
  appName: demo app - blue green
  version: V2.1.2

security:
  enabled: true

blueGreen:
  # Header used to route requests to the preview version.
  # e.g. curl -H 'x-preview: true' https://deploy.arguswatcher.net/api/
  previewHeader: x-preview
  # Interval to auto-flips the active Service.
  autoPromotionSeconds: 120
  # Seconds to keep the old version alive after promotion for instant rollback.
  scaleDownDelaySeconds: 120
