# Active Service: receives production traffic.
# spec.selector is intentionally omitted — the rollouts controller owns the
# whole selector map at runtime. Rendering selectorLabels here causes Argo CD
# Server-Side Apply to co-own spec.selector and strip the rollouts-pod-template-hash
# key on every sync, which fast-tracks the rollout past the manual-promotion pause.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend-blue-green.fullname" . }}-active
  labels:
    {{- include "backend-blue-green.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
---
# Preview Service — points at the new ReplicaSet immediately after it becomes available.
# spec.selector intentionally omitted (see comment on active Service above).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend-blue-green.fullname" . }}-preview
  labels:
    {{- include "backend-blue-green.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
