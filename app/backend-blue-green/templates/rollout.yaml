apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "backend-blue-green.fullname" . }}
  labels:
    {{- include "backend-blue-green.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "backend-blue-green.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "backend-blue-green.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz/
              port: http
          livenessProbe:
            httpGet:
              path: /healthz/
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "backend-blue-green.fullname" . }}
  strategy:
    blueGreen:
      # Service selectors are patched by Rollouts at runtime with
      # rollouts-pod-template-hash to bind active -> old ReplicaSet
      # and preview -> new ReplicaSet.
      activeService: {{ include "backend-blue-green.fullname" . }}-active
      previewService: {{ include "backend-blue-green.fullname" . }}-preview
      # Manual promotion: the new ReplicaSet stays on the preview lane until a
      # human runs `kubectl argo rollouts promote backend -n backend`.
      autoPromotionEnabled: false
      # Keep the old ReplicaSet running this long after the flip so aborts are near-instant.
      scaleDownDelaySeconds: {{ .Values.blueGreen.scaleDownDelaySeconds }}
