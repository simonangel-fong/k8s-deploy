# Subset-level split: both destinations reference the same host,
# distinguished only by `subset`. Argo Rollouts patches the two `weight`
# numbers as the canary progresses through its steps.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ include "backend.fullname" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ .Values.host | quote }}
  gateways:
    - {{ .Values.gateway.namespace }}/{{ .Values.gateway.name }}
  http:
    - name: primary
      match:
        - uri:
            prefix: /api/
      route:
        - destination:
            host: {{ include "backend.fullname" . }}
            port:
              number: {{ .Values.service.port }}
            subset: stable
          weight: 100
        - destination:
            host: {{ include "backend.fullname" . }}
            port:
              number: {{ .Values.service.port }}
            subset: canary
          weight: 0
