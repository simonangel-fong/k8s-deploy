# Single Service used by the subset-level Argo Rollouts + Istio canary pattern.
# Selector matches ALL backend pods. Traffic is NOT split here — the
# DestinationRule defines subsets, and the VirtualService weights between them.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend.fullname" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "backend.selectorLabels" . | nindent 4 }}
