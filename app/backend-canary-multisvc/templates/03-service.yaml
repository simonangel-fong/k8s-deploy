# Stable Service: receives traffic destined for the current (old) version.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend.fullname" . }}-stable
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "backend.selectorLabels" . | nindent 4 }}
---
# Canary Service: receives traffic destined for the new version during a rollout.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend.fullname" . }}-canary
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "backend.selectorLabels" . | nindent 4 }}
