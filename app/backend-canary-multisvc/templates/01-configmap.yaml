apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "backend.fullname" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen {{ .Values.service.port }};
      server_name _;

      location = /api/ {
        default_type application/json;
        return 200 '{"app":"{{ .Values.api.appName }}","version":"{{ .Values.api.version }}"}';
      }

      location = /healthz/ {
        default_type text/plain;
        return 200 'ok';
      }
    }
