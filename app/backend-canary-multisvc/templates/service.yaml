# Two Services required by the Argo Rollouts + Istio canary pattern.
# Selectors here match ALL backend pods; Rollouts patches each Service's
# selector at runtime with `rollouts-pod-template-hash: <hash>` to bind
# stable -> old ReplicaSet, canary -> new ReplicaSet. The VirtualService
# then weights traffic between the two.
---
# Stable Service — receives traffic destined for the current (old) version.
# Referenced by Rollout.spec.strategy.canary.stableService.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend.fullname" . }}-stable
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "backend.selectorLabels" . | nindent 4 }}
---
# Canary Service — receives traffic destined for the new version during a rollout.
# Referenced by Rollout.spec.strategy.canary.canaryService.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend.fullname" . }}-canary
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "backend.selectorLabels" . | nindent 4 }}
