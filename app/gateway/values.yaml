host: deploy.arguswatcher.net

gateway:
  selector:
    istio: gateway
  namespace: istio-ingress

backend:
  host: backend.backend.svc.cluster.local
  port: 80

frontend:
  host: frontend.frontend.svc.cluster.local
  port: 80

tls:
  enabled: true
  httpsRedirect: false
  secretName: deploy-tls
  issuer:
    email: simonangelfong@gmail.com
    # server: https://acme-v02.api.letsencrypt.org/directory   # prod
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    cloudflare:
      zone: arguswatcher.net
      # Secret must be created manually in the cert-manager namespace:
      #   kubectl -n cert-manager create secret generic cloudflare-api-token \
      #     --from-literal=api-token='<TOKEN>'
      tokenSecretName: cloudflare-api-token
      tokenSecretKey: api-token
