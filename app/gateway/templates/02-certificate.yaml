{{- if .Values.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: demo-cert
  namespace: {{ .Values.gateway.namespace }}
spec:
  secretName: {{ .Values.tls.secretName }}
  duration: 2160h
  renewBefore: 360h
  commonName: {{ .Values.host | quote }}
  dnsNames:
    - {{ .Values.host | quote }}
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
{{- end }}
