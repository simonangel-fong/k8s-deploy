{{- if .Values.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    email: {{ .Values.tls.issuer.email }}
    server: {{ .Values.tls.issuer.server }}
    privateKeySecretRef:
      name: letsencrypt-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: {{ .Values.tls.issuer.cloudflare.tokenSecretName }}
              key: {{ .Values.tls.issuer.cloudflare.tokenSecretKey }}
        selector:
          dnsZones:
            - {{ .Values.tls.issuer.cloudflare.zone | quote }}
{{- end }}
