apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-03-istio-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: gateway
    targetRevision: 1.30.2
    helm:
      releaseName: istio-gateway
      values: |
        service:
          type: LoadBalancer
        labels:
          gateway.networking.k8s.io/gateway-name: demo-gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-ingress
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
