# backend-canary-multidest.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-02-backend-canary-multidest
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/simonangel-fong/argocd-argorollout-istio
    targetRevision: master
    helm:
      releaseName: backend
    path: app/backend-canary-multidest
  destination:
    server: https://kubernetes.default.svc
    namespace: backend
  ignoreDifferences:
    # argo-rollouts mutates weights and route destinations at runtime
    - group: networking.istio.io
      kind: VirtualService
      name: backend
      jsonPointers:
        - /spec/http
    # argo-rollouts injects rollouts-pod-template-hash into DestinationRule subsets
    - group: networking.istio.io
      kind: DestinationRule
      name: backend
      jsonPointers:
        - /spec/subsets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
